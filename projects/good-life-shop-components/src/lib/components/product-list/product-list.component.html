<!-- OFFERS BANNERS -->
<section
  *ngIf="category?.toLowerCase() === 'offers'"
  class="offers-section"
>
  <div class="offers-grid">
    <div
      class="offer-card"
      *ngFor="let offer of offers$ | async"
      [class.active]="activeOffer?.id === offer.id"
      [class.no-image]="!offer.banner_image_url"
      [attr.data-kind]="offer.kind"
      (click)="selectOffer(offer)"
    >
      <!-- background image (only when available) -->
      <img
        *ngIf="offer.banner_image_url"
        class="offer-bg"
        [src]="offer.banner_image_url"
        alt="offer banner"
        aria-hidden="true"
      />

      <!-- gradient overlay (always present — lighter when no image) -->
      <div class="offer-overlay" [class.overlay-subtle]="!offer.banner_image_url"></div>

      <!-- content -->
      <div class="offer-content">
        <div class="offer-icon-wrap" [attr.data-kind]="offer.kind">
          <i [class]="getOfferIcon(offer.kind)"></i>
        </div>

        <div class="offer-text">
          <h3 class="offer-title">{{ offer.label }}</h3>
          <p class="offer-desc">
            {{ offer.description || 'Limited time offer. While supplies last.' }}
          </p>
        </div>

        <button class="offer-btn">Shop</button>
      </div>
    </div>
  </div>

  <!-- Clear filter -->
  <div class="offers-clear" *ngIf="activeOffer">
    <button (click)="clearOffer()">
      Show All Offers
    </button>
  </div>

  <h1 class="sale-header">Items On Sale</h1>
</section>



<section class="product-section" aria-labelledby="productListHeading">
  <div class="product-grid" role="list">
    <lib-product-card
      *ngFor="let product of products$ | async; trackBy: trackById"
      [product]="product"
      (click)="navigateToProduct(product)"
      (keydown)="handleCardKey($event, product)"
      tabindex="0"
      role="button">
    </lib-product-card>
  </div>
</section>
