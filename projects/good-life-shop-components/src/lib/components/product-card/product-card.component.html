<div
  class="card surface"
  tabindex="0"
  (keyup.enter)="onCtaClick($event)"
  (keyup.space)="onCtaClick($event)"
>
  <!-- IMAGE STAGE -->
  <div class="stage" [class.loading]="!imageLoaded">
    <img
      class="photo"
      [src]="product.image || placeholderFor(product.category, product.title)"
      [alt]="product.title"
      loading="lazy"
      decoding="async"
      (load)="onImgLoad()"
      (error)="onImgError($event)"
    />
    <div class="halo" aria-hidden="true"></div>
    <div *ngIf="dealBadgeText" class="deal-badge">{{ dealBadgeText }}</div>
  </div>

    <!-- BODY -->
    <div class="body">
    <!-- DETAILS -->
    
   <div class="price" [class.discounted]="isPriceDiscounted">
      <ng-container *ngIf="isPriceDiscounted; else regularPrice">
        <span class="old">{{ product.price | currency }}</span>
        <span class="new">{{ discountedPrice | currency }}</span>
      </ng-container>
      <ng-template #regularPrice>
        <span class="normal">{{ product.price | currency }}</span>
      </ng-template>
    </div>
    <p class="brand" [title]="product.brand">{{ product.brand }}</p>
    <div class="title-price">
      <h3 class="title" [title]="product.title">{{ product.title }}</h3>
      
    </div>

    <!-- STRAIN + WEIGHT -->
    <div class="traits">
      <span
        *ngIf="product?.strainType"
        class="pill strain {{ strainClass(product.strainType) }}"
        >{{ product.strainType }}</span
      >
      <span
        *ngIf="product?.weight && product['unit']"
        class="pill ghost"
      >
        {{ product.weight }} {{ product['unit'] }}
      </span>
    </div>

    <!-- THC / CBD -->
    <div class="meta">
      <span class="pill tiny">
        THC {{ thcDisplay }}
      </span>
      <span class="dot"></span>
      <span class="pill tiny">
        CBD {{ cbdDisplay }}
      </span>
    </div>


    <!-- ADD TO CART -->
   <button
    type="button"
    class="cta-bottom"
    (click)="onCtaClick($event)"
    [disabled]="isDisabled"
  >
    {{ hasWeightTiers ? 'Select Options' : (isAdded ? 'Added to Cart' : 'Add to Cart') }}
  </button>

  </div>
</div>
