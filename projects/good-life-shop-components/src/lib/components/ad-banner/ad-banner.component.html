<div
  *ngIf="ads.length > 0"
  class="ad-banner"
  role="button"
  tabindex="0"
  (click)="onBannerClick(ads[currentAdIndex])"
  (mouseenter)="pause()"
  (mouseleave)="resume()"
>
  <img
    [src]="ads[currentAdIndex]"
    alt="Advertisement banner"
    class="ad-image"
    loading="lazy"
    decoding="async"
  />
</div>
